<!DOCTYPE html>
<html>
<head>
    <title>Butler Dashboard</title>
    {% load static %}

    <style>
    body {
        margin: 0;
        overflow: hidden;
    }

    video {
        width: 100%;
        height: 100vh;
        object-fit: cover;
    }
</style>
</head>

<body>

<div onclick="handleInteraction()">
    <video autoplay muted loop>
        <source src="{% static 'video/butler_video.mp4' %}" type="video/mp4">
    </video>
</div>

<script>
    let entered = false;

    function handleInteraction() {

        // 🔒 Prevent multiple triggers
        if (entered) return;
        entered = true;

        // 🎤 Speak ONLY first time ever
        if (sessionStorage.getItem("butler_spoken") !== "true") {
            const speech = new SpeechSynthesisUtterance("Welcome to Butler World");
            speech.rate = 1;
            speech.pitch = 1;
            speech.volume = 1;

            window.speechSynthesis.speak(speech);

            sessionStorage.setItem("butler_spoken", "true");
        }

        // 🚀 Redirect after slight delay (so voice starts)
        setTimeout(() => {
            window.location.href = "/dashboard/";
        }, 1000);
    }

    // Keyboard
    document.addEventListener("keydown", handleInteraction);

    // Mouse click
    document.addEventListener("click", handleInteraction);

    // Reset only redirect flag (NOT speech memory)
    window.addEventListener("pageshow", function() {
        entered = false;
    });
</script>

</body>
</html>
